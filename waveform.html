<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flow Waves</title>
<style>
  :root {
    --bg: #0B0D12;
    --pill: #141821;
    --pill-edge: #232937;
    --text: #8A93A6;
    --wave-a: #7C6CFF;
    --wave-b: #4FD1E0;
  }
  * { margin: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
    color: var(--text);
  }
  .pill {
    width: min(520px, 88vw);
    height: 120px;
    background: var(--pill);
    border: 1px solid var(--pill-edge);
    border-radius: 28px;
    box-shadow: 0 24px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04);
    overflow: hidden;
  }
  canvas { width: 100%; height: 100%; display: block; }
  button {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--pill-edge);
    border-radius: 999px;
    padding: 9px 22px;
    font: inherit;
    font-size: 14px;
    letter-spacing: .02em;
    cursor: pointer;
    transition: color .2s, border-color .2s;
  }
  button:hover { color: #E8ECF4; border-color: #3A4356; }
  button:focus-visible { outline: 2px solid var(--wave-b); outline-offset: 3px; }
  .status { font-size: 12px; letter-spacing: .08em; text-transform: uppercase; opacity: .7; }
</style>
</head>
<body>
  <div class="pill"><canvas id="c"></canvas></div>
  <button id="mic">Start listening</button>
  <p class="status" id="status">idle — waves breathe on their own</p>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const btn = document.getElementById('mic');
const status = document.getElementById('status');
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

let analyser = null, timeData = null;
let level = 0;        // smoothed 0..1 mic level
let t = 0;            // phase clock

function resize() {
  const r = canvas.parentElement.getBoundingClientRect();
  const dpr = devicePixelRatio || 1;
  canvas.width = r.width * dpr;
  canvas.height = r.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
addEventListener('resize', resize);
resize();

btn.addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const ac = new AudioContext();
    const src = ac.createMediaStreamSource(stream);
    analyser = ac.createAnalyser();
    analyser.fftSize = 1024;
    timeData = new Uint8Array(analyser.fftSize);
    src.connect(analyser);
    btn.hidden = true;
    status.textContent = 'listening — speak to see the waves react';
  } catch {
    status.textContent = 'microphone unavailable — check permissions';
  }
});

function micLevel() {
  analyser.getByteTimeDomainData(timeData);
  let sum = 0;
  for (let i = 0; i < timeData.length; i++) {
    const v = (timeData[i] - 128) / 128;
    sum += v * v;
  }
  return Math.min(1, Math.sqrt(sum / timeData.length) * 4);
}

// three sinusoid layers: [spatial freq, speed, amplitude share, alpha]
const layers = [
  [1.6, 1.00, 1.00, 0.9],
  [2.3, -0.62, 0.65, 0.45],
  [3.1, 0.83, 0.40, 0.25],
];

function draw() {
  const w = canvas.width / (devicePixelRatio || 1);
  const h = canvas.height / (devicePixelRatio || 1);
  const mid = h / 2;
  ctx.clearRect(0, 0, w, h);

  // idle breathing when no mic; live level when listening
  const idle = 0.08 + 0.04 * Math.sin(t * 0.9);
  const target = analyser ? Math.max(idle * 0.5, micLevel()) : idle;
  level += (target - level) * (target > level ? 0.3 : 0.06); // fast attack, slow release

  const grad = ctx.createLinearGradient(0, 0, w, 0);
  grad.addColorStop(0, '#7C6CFF');
  grad.addColorStop(1, '#4FD1E0');

  const maxAmp = h * 0.38;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.shadowColor = 'rgba(110, 130, 255, 0.55)';
  ctx.shadowBlur = 14;

  for (const [freq, speed, share, alpha] of layers) {
    ctx.beginPath();
    for (let x = 0; x <= w; x += 2) {
      const p = x / w;
      const envelope = Math.sin(p * Math.PI) ** 1.4; // taper to zero at edges
      const y = mid + Math.sin(p * Math.PI * 2 * freq + t * speed * 2.4)
                    * maxAmp * level * share * envelope;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = grad;
    ctx.globalAlpha = alpha;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  if (!reduceMotion || analyser) t += 0.016;
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
